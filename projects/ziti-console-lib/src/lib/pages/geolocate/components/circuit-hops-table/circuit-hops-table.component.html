<div class="circuit-hops-section" *ngIf="circuitHops && circuitHops.length > 0">
  <div class="circuit-hops-container">
    <div class="router-path-header">
      <span class="router-path-icon icon-routers"></span>
      <span class="router-path-text">Circuit Hops ({{ circuitHops?.length }})</span>
    </div>
    <div class="router-path-list">
      <table class="router-path-table">
        <thead>
          <tr>
            <th>#</th>
            <th>From</th>
            <th></th>
            <th>To</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let hop of circuitHops; let i = index"
              (click)="hopSelected.emit({hop, index: i})"
              [class.selected-row]="selectedSegmentIndex === i"
              class="clickable-circuit-row">
            <td class="hop-number">{{ i + 1 }}</td>
            <td class="hop-from">
              <span [class]="hop.fromType === 'identity' ? 'icon-identity' : 'icon-routers'" class="hop-entity-icon"></span>
              <span class="hop-entity-name">{{ hop.from }}</span>
            </td>
            <td class="hop-arrow">→</td>
            <td class="hop-to">
              <span [class]="hop.toType === 'identity' ? 'icon-identity' : 'icon-routers'" class="hop-entity-icon"></span>
              <span class="hop-entity-name">{{ hop.to }}</span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
